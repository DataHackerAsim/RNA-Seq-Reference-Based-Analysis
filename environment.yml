# ==========================================================
# RNA-Seq Reference-Based Analysis — Tool Requirements
# Platform: Galaxy Europe (https://usegalaxy.eu)
# ==========================================================
# No local installation is required.
# All tools listed below are executed on the Galaxy web
# platform. This file serves as a version-pinned record
# for reproducibility.
# ==========================================================

platform: Galaxy (usegalaxy.eu)

tools:
  # Quality Control
  - Falco: 1.2.4+galaxy0
  - MultiQC: 1.27+galaxy4
  - Cutadapt: 5.2+galaxy0

  # Alignment
  - RNA_STAR: 2.7.11b+galaxy0

  # Quantification
  - featureCounts: 2.1.1+galaxy0

  # Differential Expression
  - DESeq2: 2.11.40.8+galaxy0

  # Annotation & Filtering
  - Annotate_DESeq2: 1.1.0+galaxy1
  - Filter: 1.1.0
  - Compute: 2.1
  - Cut: 1.0
  - Change_Case: 1.0
  - Concatenate_datasets: 1.0
  - Join_two_Datasets: 2.1.3
  - Flatten_collection: 1.0

  # Visualization
  - heatmap2: 3.2.0+galaxy1

  # Functional Enrichment
  - goseq: 1.50.0+galaxy0
